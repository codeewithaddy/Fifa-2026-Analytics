services:
  - type: web
    name: fifa-2026-intelligence-hub
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: KAGGLE_USERNAME
        sync: false   # Set this in the Render dashboard (secret)
      - key: KAGGLE_KEY
        sync: false   # Set this in the Render dashboard (secret)
      - key: PYTHON_VERSION
        value: 3.11.0

  # Refresh Kaggle player stats CSV every 6 hours during active tournament
  - type: cron
    name: fifa-data-refresh-6h
    runtime: python
    schedule: "0 */6 * * *"   # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    buildCommand: pip install -r requirements.txt
    startCommand: python refresh_data.py
    envVars:
      - key: KAGGLE_USERNAME
        sync: false
      - key: KAGGLE_KEY
        sync: false
